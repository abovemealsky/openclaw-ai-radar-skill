<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Radar Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🤖 AI Radar Dashboard</h1>
            <p id="last-updated">Loading...</p>
        </div>
    </header>

    <main class="container">
        <!-- Model Releases -->
        <section class="card">
            <h2>🤖 Model Releases</h2>
            <div id="model-releases" class="items">
                <p class="loading">Loading...</p>
            </div>
        </section>

        <!-- Research Highlights -->
        <section class="card">
            <h2>📚 Research Highlights</h2>
            <div id="research" class="items">
                <p class="loading">Loading...</p>
            </div>
        </section>

        <!-- Open Source -->
        <section class="card">
            <h2>🛠️ Open Source</h2>
            <div id="open-source" class="items">
                <p class="loading">Loading...</p>
            </div>
        </section>

        <!-- Industry Developments -->
        <section class="card">
            <h2>🏭 Industry Developments</h2>
            <div id="industry" class="items">
                <p class="loading">Loading...</p>
            </div>
        </section>

        <!-- Policy & Governance -->
        <section class="card">
            <h2>⚖️ Policy & Governance</h2>
            <div id="policy" class="items">
                <p class="loading">Loading...</p>
            </div>
        </section>

        <!-- Quick Take -->
        <section class="card quick-take">
            <h2>💡 Quick Take</h2>
            <p id="quick-take">Loading...</p>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>AI Radar - Structured AI Intelligence</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
